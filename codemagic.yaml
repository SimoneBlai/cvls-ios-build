workflows:
  ios-unsigned-ipa:
    name: CVLS iOS unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install

      - name: Check web app files
        script: |
          if [ ! -d "www" ]; then
            echo "ERRORE: cartella www non trovata"
            exit 1
          fi
          echo "Cartella www trovata"
          ls -la www

      - name: Copy web files into iOS project
        script: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -R www/* ios/App/App/public/
          cp capacitor.config.json ios/App/App/public/
          echo "File copiati in ios/App/App/public"
          ls -la ios/App/App/public

      - name: Fix Swift Package paths
        script: |
          python3 - <<'PY'
          from pathlib import Path

          package_file = Path("ios/App/CapApp-SPM/Package.swift")
          text = package_file.read_text()
          text = text.replace("\\", "/")
          package_file.write_text(text)

          print(package_file.read_text())
          PY

      - name: Show Xcode project info
        script: |
          xcodebuild -list -project ios/App/App.xcodeproj

      - name: Resolve Swift packages
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build unsigned iOS app
        script: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        script: |
          cd ios/App
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERRORE: nessuna .app trovata"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r CVLS-unsigned.ipa Payload

    artifacts:
      - ios/App/CVLS-unsigned.ipa
      - ios/App/build/Build/Products/Release-iphoneos/*.app