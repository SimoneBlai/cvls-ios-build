workflows:
  ios-unsigned-ipa:
    name: CVLS iOS unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Show Xcode project info
        script: |
          xcodebuild -list -project ios/App/App.xcodeproj

      - name: Resolve Swift packages
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build unsigned iOS app
        script: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        script: |
          cd ios/App
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r CVLS-unsigned.ipa Payload

    artifacts:
      - ios/App/CVLS-unsigned.ipa
      - ios/App/build/Build/Products/Release-iphoneos/*.app